<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <style>
      :root {
        --background: #ffec22;
        --panel: #fffcee;
        --button: #ffffff;
        --border: #c4b811;
        --text: #191c26;
        --muted: #4f5160;
        --shadow: rgba(0, 0, 0, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #fff75c 0%, var(--background) 45%, #f5d900 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .page {
        width: min(100%, 760px);
        padding: 32px;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.96);
        border: 2px solid rgba(25, 28, 38, 0.08);
        box-shadow: 0 24px 60px var(--shadow);
      }

      .title {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.8rem);
        text-align: center;
        letter-spacing: 0.06em;
        color: #191c26;
      }

      .subtitle {
        margin: 0 auto 28px;
        text-align: center;
        color: var(--muted);
        font-size: 1rem;
        max-width: 420px;
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-bottom: 28px;
      }

      .move-button {
        background: var(--button);
        border: 2px solid var(--border);
        border-radius: 28px;
        min-height: 160px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.08);
        padding: 18px 10px;
      }

      .move-button:hover,
      .move-button:focus {
        transform: translateY(-4px);
        border-color: #191c26;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.14);
        outline: none;
      }

      .move-icon {
        height: 70px;
        width: auto;
        display: block;
      }

      .move-label {
        margin-top: 14px;
        font-size: 0.95rem;
        letter-spacing: 0.18em;
        color: #191c26;
        font-weight: 700;
      }

      .result {
        margin: 0 0 10px;
        font-size: clamp(1.3rem, 2vw, 1.8rem);
        text-align: center;
        color: #191c26;
        font-weight: 700;
      }

      .move-history {
        margin: 0 0 18px;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 0.95rem;
      }

      .move-history span {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .score {
        margin: 0 0 24px;
        text-align: center;
        color: #191c26;
        font-size: 1rem;
      }

      .reset-score-button {
        width: 100%;
        border: none;
        border-radius: 999px;
        background: #191c26;
        color: #ffec22;
        font-weight: 700;
        padding: 14px 18px;
        cursor: pointer;
        transition: filter 0.2s ease, transform 0.2s ease;
      }

      .reset-score-button:hover {
        filter: brightness(1.08);
        transform: translateY(-1px);
      }

      @media (max-width: 640px) {
        .page {
          padding: 24px;
        }

        .button-row {
          gap: 12px;
        }

        .move-button {
          min-height: 140px;
        }

        .move-icon {
          height: 60px;
        }
      }

      @media (max-width: 460px) {
        .button-row {
          grid-template-columns: 1fr;
        }

        .move-button {
          min-height: 100px;
        }

        .move-label {
          margin-top: 10px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1 class="title">Rock Paper Scissors</h1>
      <p class="subtitle">Tap a move to play against the computer.</p>

      <div class="button-row">
        <button onclick="playGame('rock');" class="move-button" aria-label="Rock">
          <img src="images/rock-emoji.png" class="move-icon" alt="Rock">
          <span class="move-label">ROCK</span>
        </button>

        <button onclick="playGame('paper');" class="move-button" aria-label="Paper">
          <img src="images/paper-emoji.png" class="move-icon" alt="Paper">
          <span class="move-label">PAPER</span>
        </button>

        <button onclick="playGame('scissors');" class="move-button" aria-label="Scissors">
          <img src="images/scissors-emoji.png" class="move-icon" alt="Scissors">
          <span class="move-label">SCISSORS</span>
        </button>
      </div>

      <p class="js-result result"></p>
      <p class="js-moves move-history"></p>
      <p class="js-score score"></p>

      <button onclick="score.wins = 0; score.losses = 0; score.ties = 0; localStorage.removeItem('score'); updateScoreElement();" class="reset-score-button">Reset Score</button>
    </div>

    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0,
        ties: 0
      };

      updateScoreElement();

      /*
      if (!score) {
        score = {
          wins: 0,
          losses: 0,
          ties: 0
        };
      }
      */

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') {
            result = 'You lose.';
          } else if (computerMove === 'paper') {
            result = 'You win.';
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
          }

        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') {
            result = 'You win.';
          } else if (computerMove === 'paper') {
            result = 'Tie.';
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
          }
          
        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') {
            result = 'Tie.';
          } else if (computerMove === 'paper') {
            result = 'You lose.';
          } else if (computerMove === 'scissors') {
            result = 'You win.';
          }
        }

        if (result === 'You win.') {
          score.wins += 1;
        } else if (result === 'You lose.') {
          score.losses += 1;
        } else if (result === 'Tie.') {
          score.ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score));

        updateScoreElement();

        document.querySelector('.js-result').innerHTML = result;

        document.querySelector('.js-moves').innerHTML =
          `<span>You</span>
           <span><img src="images/${playerMove}-emoji.png" class="move-icon"><img src="images/${computerMove}-emoji.png" class="move-icon"></span>
           <span>Computer</span>`;
      }

      function updateScoreElement() {
        document.querySelector('.js-score')
          .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }

        return computerMove;
      }
    </script>
  </body>
</html>
